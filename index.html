<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Survey Hub · Baskin-Robbins Korea</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F3ECDF; --paper:#FFFFFF; --navy:#1E2440; --ink:#2B3358; --slate:#737B9C;
    --cobalt:#2B4CC4; --cobalt-deep:#1E3795; --cobalt-soft:#E7EBFA;
    --gold:#C2974A; --gold-soft:#F4EAD6; --green:#1E9E7E; --green-soft:#E2F3EE;
    --line:#E7DECF; --line2:#EDE7DC; --shadow:rgba(30,36,64,.4);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Hanken Grotesk',system-ui,sans-serif; color:var(--ink); font-size:16px; line-height:1.5;
    background:
      radial-gradient(120% 50% at 100% 0%, var(--gold-soft) 0%, transparent 42%),
      radial-gradient(130% 55% at 0% -5%, var(--cobalt-soft) 0%, transparent 50%),
      var(--cream);
    min-height:100vh; display:flex; flex-direction:column;
  }
  .nav{display:flex; align-items:center; justify-content:space-between; padding:16px clamp(20px,5vw,56px);
    position:sticky; top:0; z-index:20; background:rgba(243,236,223,.85); backdrop-filter:blur(8px); border-bottom:1px solid var(--line);}
  .brand{display:flex; align-items:center; gap:11px;}
  .brand .wm{font-family:'Plus Jakarta Sans',sans-serif; font-weight:800; font-size:18px; color:var(--navy); line-height:1; display:flex; flex-direction:column; letter-spacing:-.01em;}
  .brand .wm small{font-family:'Hanken Grotesk',sans-serif; font-weight:600; font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--slate); margin-top:3px;}
  .langtoggle{font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:12.5px; letter-spacing:.02em; color:var(--cobalt); background:var(--paper);
    border:1.5px solid var(--cobalt-soft); border-radius:999px; padding:8px 16px; cursor:pointer; transition:all .14s ease; display:inline-flex; align-items:center; gap:7px;}
  .langtoggle::before{content:"🌐"; font-size:13px;}
  .langtoggle:hover{border-color:var(--cobalt); background:var(--cobalt-soft);}

  main{flex:1; width:100%; max-width:1000px; margin:0 auto; padding:clamp(28px,5vw,52px) clamp(18px,4vw,40px);}
  .hero h1{font-family:'Plus Jakarta Sans',sans-serif; font-weight:800; font-size:clamp(32px,5.5vw,48px); letter-spacing:-.025em; margin:0; color:var(--navy);}
  .hero p{font-size:17px; color:var(--slate); margin:12px 0 0; max-width:58ch;}
  .stats{display:flex; gap:12px; margin-top:24px; flex-wrap:wrap;}
  .stat{background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:14px 20px; min-width:104px;}
  .stat b{font-family:'Plus Jakarta Sans',sans-serif; font-weight:800; font-size:26px; letter-spacing:-.02em;}
  .stat span{display:block; font-size:12.5px; color:var(--slate); margin-top:1px; font-weight:500;}
  .stat.gn b{color:var(--green);} .stat.gd b{color:var(--gold);} .stat.cb b{color:var(--cobalt);}

  .sec{margin-top:42px;}
  .sec-head{display:flex; align-items:center; gap:14px; padding:16px 20px; border-radius:16px 16px 0 0; border:1.5px solid; border-bottom:none;}
  .sec-head.active{background:var(--green-soft); border-color:#CBE8DF;}
  .sec-head.done{background:#EFEAE1; border-color:var(--line);}
  .sec-dot{width:11px; height:11px; border-radius:50%; flex:none;}
  .sec-head.active .sec-dot{background:var(--green); box-shadow:0 0 0 4px rgba(30,158,126,.2); animation:pulse 2s infinite;}
  .sec-head.done .sec-dot{background:#B7AE9C;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(30,158,126,.2);}50%{box-shadow:0 0 0 7px rgba(30,158,126,.06);}}
  .sec-head h2{font-family:'Plus Jakarta Sans',sans-serif; font-weight:800; font-size:19px; letter-spacing:-.01em; margin:0;}
  .sec-head.active h2{color:#157A60;} .sec-head.done h2{color:var(--slate);}
  .sec-head .sub{font-size:13.5px; color:var(--slate);}
  .sec-head .badge{margin-left:auto; font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:12.5px; padding:6px 13px; border-radius:999px;}
  .sec-head.active .badge{background:var(--green); color:#fff;}
  .sec-head.done .badge{background:#C9C0AE; color:#fff;}
  .sec-body{border:1.5px solid; border-top:none; border-radius:0 0 16px 16px; padding:18px;}
  .sec-body.active{border-color:#CBE8DF; background:rgba(226,243,238,.35);}
  .sec-body.done{border-color:var(--line); background:rgba(239,234,225,.4);}

  .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:16px;}
  @media (max-width:720px){ .grid{grid-template-columns:1fr;} }
  .acard{display:flex; flex-direction:column; background:var(--paper); border:1.5px solid var(--line2); border-radius:18px;
    padding:22px; text-decoration:none; color:inherit; cursor:pointer; transition:all .16s ease; position:relative; overflow:hidden;}
  .acard::before{content:""; position:absolute; top:0; left:0; right:0; height:5px; background:var(--green);}
  .acard.feature::before{background:linear-gradient(90deg,var(--cobalt),var(--green));}
  .acard:hover{border-color:var(--cobalt); transform:translateY(-3px); box-shadow:0 26px 46px -26px var(--shadow);}
  .acard.disabled{cursor:default;}
  .acard.disabled::before{background:#C9C0AE;}
  .acard.disabled:hover{border-color:var(--line2); transform:none; box-shadow:none;}
  .ac-top{display:flex; align-items:center; justify-content:space-between; margin:6px 0 14px;}
  .emoji{font-size:32px; line-height:1;}
  .tag{font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:10.5px; letter-spacing:.06em; padding:5px 10px; border-radius:999px; background:var(--cobalt-soft); color:var(--cobalt-deep);}
  .live{font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:11px; color:#157A60; display:inline-flex; align-items:center; gap:6px;}
  .live .d{width:7px; height:7px; border-radius:50%; background:var(--green); animation:pulse 2s infinite;}
  .acard h3{font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:20px; line-height:1.22; letter-spacing:-.01em; margin:0 0 8px; color:var(--navy);}
  .desc{font-size:14.5px; color:var(--slate); line-height:1.5; margin:0;}
  .meta{font-size:13px; color:var(--slate); margin-top:16px; display:flex; gap:9px; flex-wrap:wrap; align-items:center; font-weight:500;}
  .meta .sep{opacity:.45;}
  .cta{margin-top:18px; align-self:flex-start; font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:14px;
    background:var(--cobalt); color:#fff; padding:11px 18px; border-radius:12px; display:inline-flex; align-items:center; gap:8px; transition:all .16s ease;}
  .acard:hover .cta{background:var(--cobalt-deep);} .acard:hover .cta .arr{transform:translateX(3px);}
  .cta.muted{background:#EAE3D6; color:var(--slate);} .acard:hover .cta.muted{background:#EAE3D6;}
  .arr{transition:transform .16s ease;}

  .donelist{display:flex; flex-direction:column;}
  .drow{display:flex; align-items:center; gap:16px; padding:16px 14px; border-radius:12px; text-decoration:none; color:inherit;
    cursor:pointer; transition:background .14s ease; border-bottom:1px solid var(--line);}
  .drow:last-child{border-bottom:none;}
  .drow:hover{background:rgba(255,255,255,.7);}
  .drow.disabled{cursor:default;}
  .d-emoji{font-size:22px; line-height:1; filter:grayscale(.35); opacity:.85; flex:none;}
  .d-main{flex:1; min-width:0;}
  .d-title{font-family:'Plus Jakarta Sans',sans-serif; font-weight:600; font-size:16px; color:var(--ink); margin:0; line-height:1.3;}
  .d-meta{font-size:12.5px; color:var(--slate); margin-top:3px;}
  .d-resp{font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:13.5px; color:var(--ink); white-space:nowrap;}
  .d-go{font-family:'Plus Jakarta Sans',sans-serif; font-weight:600; font-size:13px; color:var(--slate); white-space:nowrap; display:inline-flex; align-items:center; gap:5px;}
  .drow:hover .d-go{color:var(--cobalt);}
  @media (max-width:560px){ .d-resp{display:none;} }

  footer{padding:26px clamp(20px,5vw,56px); border-top:1px solid var(--line); display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;}
  footer span{font-size:12.5px; color:var(--slate);}

  .toast{position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px); background:var(--navy); color:#fff;
    font-size:14px; padding:13px 20px; border-radius:14px; opacity:0; pointer-events:none; transition:all .25s ease; z-index:50; box-shadow:0 18px 40px -16px var(--shadow); max-width:90vw;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .fade{animation:rise .4s cubic-bezier(.2,.7,.3,1);}
  @keyframes rise{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important;}}
  a:focus-visible,.drow:focus-visible,.acard:focus-visible,.langtoggle:focus-visible{outline:2px solid var(--cobalt); outline-offset:2px;}

  .intro{position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center; text-align:center; cursor:pointer;
    color:#fff;
    background:
      radial-gradient(circle at 1px 1px, rgba(255,255,255,.07) 1.5px, transparent 1.6px) 0 0/26px 26px,
      radial-gradient(120% 120% at 50% 0%, #3C5DD8 0%, #2B4CC4 46%, #1C3490 100%);
    transition:opacity .85s ease, transform .85s ease, filter .85s ease;}
  .intro.out{opacity:0; transform:scale(1.05); filter:blur(7px); pointer-events:none;}
  .intro-inner{animation:introIn .9s cubic-bezier(.2,.8,.25,1) both; padding:0 24px;}
  .intro-mark{animation:introPop .75s cubic-bezier(.2,1.2,.3,1) both; filter:drop-shadow(0 12px 24px rgba(0,0,0,.25));}
  .intro-eyebrow{font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:13px; letter-spacing:.28em; text-transform:uppercase; color:#C9D4FF; margin-top:26px;}
  .intro-title{font-family:'Plus Jakarta Sans',sans-serif; font-weight:800; font-size:clamp(38px,8vw,68px); letter-spacing:-.03em; margin:10px 0 0; line-height:1;}
  .intro-by{font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:clamp(15px,2.4vw,18px); color:#F0CD8C; margin-top:14px; letter-spacing:.01em;}
  .intro-skip{position:absolute; bottom:30px; left:50%; transform:translateX(-50%); font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,.55); font-family:'Plus Jakarta Sans',sans-serif; font-weight:600;}
  @keyframes introIn{from{opacity:0; transform:translateY(16px) scale(.97);} to{opacity:1; transform:none;}}
  @keyframes introPop{from{opacity:0; transform:scale(.55);} to{opacity:1; transform:scale(1);}}

  /* --- center-aligned home --- */
  .hero{text-align:center;}
  .hero p{margin-left:auto; margin-right:auto;}
  .stats{justify-content:center;}
  .sec-head{justify-content:center;}
</style>
</head>
<body>

<div class="intro" id="intro">
  <div class="intro-inner">
    <svg class="intro-mark" width="84" height="84" viewBox="0 0 72 72" aria-hidden="true">
      <circle cx="36" cy="36" r="34" fill="#fff" stroke="#1E2440" stroke-width="2.5"/>
      <circle cx="36" cy="36" r="28" fill="none" stroke="#E7EBFA" stroke-width="1.5"/>
      <text x="36" y="37.5" text-anchor="middle" dominant-baseline="central" font-family="Plus Jakarta Sans, sans-serif" font-weight="800" font-size="29" fill="#2B4CC4" style="letter-spacing:-1px">31</text>
      <circle cx="16" cy="20" r="2.4" fill="#2B4CC4"/><circle cx="57" cy="22" r="2.4" fill="#C2974A"/><circle cx="52" cy="54" r="2.4" fill="#2B4CC4"/>
    </svg>
    <div class="intro-eyebrow" id="introEyebrow">Welcome to</div>
    <h1 class="intro-title">BRK Survey Hub</h1>
    <div class="intro-by">by BR Genius</div>
  </div>
</div>

<header class="nav">
  <div class="brand">
    <svg width="30" height="30" viewBox="0 0 72 72" aria-hidden="true">
      <circle cx="36" cy="36" r="34" fill="#fff" stroke="#1E2440" stroke-width="2.5"/>
      <circle cx="36" cy="36" r="28" fill="none" stroke="#E7EBFA" stroke-width="1.5"/>
      <text x="36" y="37.5" text-anchor="middle" dominant-baseline="central" font-family="Plus Jakarta Sans, sans-serif" font-weight="800" font-size="29" fill="#2B4CC4" style="letter-spacing:-1px">31</text>
      <circle cx="16" cy="20" r="2.4" fill="#2B4CC4"/><circle cx="57" cy="22" r="2.4" fill="#C2974A"/><circle cx="52" cy="54" r="2.4" fill="#2B4CC4"/>
    </svg>
    <span class="wm">Survey Hub<small>Baskin-Robbins Korea · 마케팅전략실</small></span>
  </div>
  <button class="langtoggle" id="langToggle">한국어</button>
</header>

<main class="fade">
  <section class="hero">
    <h1 id="heroH1">Surveys</h1>
    <p id="heroP"></p>
    <div class="stats" id="stats"></div>
  </section>

  <section class="sec">
    <div class="sec-head active">
      <span class="sec-dot"></span>
      <div><h2 id="secActiveH">Active surveys</h2><div class="sub" id="secActiveSub">Open to respondents right now</div></div>
      <span class="badge" id="activeBadge"></span>
    </div>
    <div class="sec-body active"><div class="grid" id="activeGrid"></div></div>
  </section>

  <section class="sec">
    <div class="sec-head done">
      <span class="sec-dot"></span>
      <div><h2 id="secDoneH">Completed surveys</h2><div class="sub" id="secDoneSub">Closed — archived results</div></div>
      <span class="badge" id="doneBadge"></span>
    </div>
    <div class="sec-body done"><div class="donelist" id="doneList"></div></div>
  </section>
</main>

<footer>
  <span>© Baskin-Robbins Korea · 마케팅전략실</span>
  <span id="today"></span>
</footer>

<div class="toast" id="toast"></div>

<script>
/* ===================== i18n ===================== */
var lang = 'en';
var UI = {
  en:{
    heroH1:"Surveys",
    heroP:'Every survey in one place. <b style="color:var(--green)">Active</b> surveys are collecting responses now — tap to open. <b style="color:var(--slate)">Completed</b> surveys are closed — tap to view their results.',
    sActive:"Active", sCompleted:"Completed", sTotal:"Total",
    activeH:"Active surveys", activeSub:"Open to respondents right now",
    doneH:"Completed surveys", doneSub:"Closed — archived results",
    running:"running", archived:"archived",
    open:"Open survey", results:"View results", notLinked:"Not linked yet",
    flagship:"FLAGSHIP", live:"LIVE",
    toggle:"한국어", eyebrow:"Welcome to"
  },
  ko:{
    heroH1:"설문 조사",
    heroP:'모든 설문을 한 곳에서. <b style="color:var(--green)">진행 중</b> 설문은 지금 응답을 받고 있어요 — 탭하여 열기. <b style="color:var(--slate)">완료</b> 설문은 종료되었어요 — 탭하여 결과 보기.',
    sActive:"진행 중", sCompleted:"완료", sTotal:"전체",
    activeH:"진행 중 설문", activeSub:"지금 응답을 받고 있어요",
    doneH:"완료된 설문", doneSub:"종료 · 보관된 결과",
    running:"개 진행", archived:"개 보관",
    open:"설문 열기", results:"결과 보기", notLinked:"링크 미연결",
    flagship:"플래그십", live:"진행 중",
    toggle:"EN", eyebrow:"환영합니다"
  }
};
function t(k){ return (UI[lang][k]!==undefined?UI[lang][k]:UI.en[k]); }
function L(o){ return (o && o[lang]!==undefined)?o[lang]:(o?o.en:""); }

/* ===================== SURVEY LIST =====================
   title / desc / period / meta / responses each take {en, ko}.
   Set "url" (active) or "resultsUrl" (completed) to link a card.
   ====================================================== */
var SURVEYS = [
  {
    title:{en:"Workshop Store — International Visitor Survey", ko:"Workshop 매장 — 외국인 방문객 설문"},
    desc:{en:"International guest feedback at the Workshop flagship — how they found us, ordering, and what they loved.",
          ko:"Workshop 플래그십 외국인 방문객 피드백 — 인지 경로, 주문 경험, 좋았던 점."},
    status:"active", emoji:"🍦", feature:true,
    period:{en:"2026.06.16 – ongoing", ko:"2026.06.16 – 진행 중"},
    meta:{en:"English · ~3 min", ko:"영문 · 약 3분"},
    responses:{en:"Live", ko:"진행 중"},
    url:"br-survey-system.html"
  },
  {
    title:{en:"Sept FOM IMC Concept Pre-test", ko:"9월 FOM IMC 컨셉 사전 반응 조사"},
    desc:{en:"Pre-test of the Monchhichi collab concept '엄마의 친구, 너의 31'.",
          ko:"몬치치 콜라보 '엄마의 친구, 너의 31' 컨셉 사전 선호도 테스트."},
    status:"active", emoji:"🎯",
    period:{en:"2026.07 (planned)", ko:"2026.07 예정"},
    meta:{en:"Korean · ~4 min", ko:"국문 · 약 4분"},
    responses:{en:"Coming soon", ko:"준비 중"},
    url:"", note:{en:"This survey isn't linked yet — set its url in the SURVEYS list.", ko:"아직 링크가 연결되지 않았습니다. SURVEYS 목록에서 url을 설정해 주세요."}
  },
  {
    title:{en:"Brand Health Tracking — 2026 H1", ko:"BR 브랜드 헬스 트래킹 — 2026 상반기"},
    desc:{en:"Regular tracking of brand awareness, preference, and visit intent.", ko:"브랜드 인지도·선호도·방문 의향 정기 추적 조사."},
    status:"completed", emoji:"📊",
    period:{en:"2026.01 – 2026.03", ko:"2026.01 – 2026.03"},
    meta:{en:"Korean", ko:"국문"},
    responses:{en:"1,284 responses", ko:"응답 1,284"}, resultsUrl:""
  },
  {
    title:{en:"Signature Mashup Tasting Test", ko:"시그니처 매시업 시식 테스트"},
    desc:{en:"Taste, visual, and repurchase-intent rating for the F1 signature menu.", ko:"F1 시그니처 신메뉴 맛·비주얼·재구매 의향 평가."},
    status:"completed", emoji:"🍨",
    period:{en:"2025.11", ko:"2025.11"},
    meta:{en:"Korean", ko:"국문"},
    responses:{en:"612 responses", ko:"응답 612"}, resultsUrl:""
  },
  {
    title:{en:"1020 Target SNS Preference Study", ko:"1020 타깃 SNS 선호도 조사"},
    desc:{en:"Content, channel, and collab preferences among the 1020 female target.", ko:"1020 여성 타깃의 콘텐츠·채널·콜라보 선호 분석."},
    status:"completed", emoji:"📱",
    period:{en:"2025.09", ko:"2025.09"},
    meta:{en:"Korean", ko:"국문"},
    responses:{en:"938 responses", ko:"응답 938"}, resultsUrl:""
  }
];

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function activeCard(s){
  var inner =
    '<div class="ac-top"><span class="emoji">'+esc(s.emoji||"📋")+'</span>'+
      (s.feature?'<span class="tag">'+t('flagship')+'</span>':'<span class="live"><span class="d"></span>'+t('live')+'</span>')+'</div>'+
    '<h3>'+esc(L(s.title))+'</h3>'+
    '<p class="desc">'+esc(L(s.desc))+'</p>'+
    '<div class="meta"><span>'+esc(L(s.period))+'</span><span class="sep">·</span><span>'+esc(L(s.meta))+'</span><span class="sep">·</span><span>'+esc(L(s.responses))+'</span></div>';
  if(s.url){
    return '<a class="acard'+(s.feature?' feature':'')+'" href="'+esc(s.url)+'">'+inner+'<span class="cta">'+t('open')+' <span class="arr">→</span></span></a>';
  }
  return '<div class="acard disabled" role="button" tabindex="0" data-note="'+esc(L(s.note)||"")+'">'+inner+'<span class="cta muted">'+t('notLinked')+'</span></div>';
}
function doneRow(s){
  var inner =
    '<span class="d-emoji">'+esc(s.emoji||"📋")+'</span>'+
    '<span class="d-main"><span class="d-title">'+esc(L(s.title))+'</span><span class="d-meta">'+esc(L(s.period))+' · '+esc(L(s.meta))+'</span></span>'+
    '<span class="d-resp">'+esc(L(s.responses))+'</span>'+
    '<span class="d-go">'+t('results')+' <span class="arr">→</span></span>';
  if(s.resultsUrl){ return '<a class="drow" href="'+esc(s.resultsUrl)+'">'+inner+'</a>'; }
  return '<div class="drow disabled" role="button" tabindex="0" data-note="'+esc(L(s.note)||"")+'">'+inner+'</div>';
}

function render(){
  var act=SURVEYS.filter(function(s){return s.status==="active";});
  var done=SURVEYS.filter(function(s){return s.status==="completed";});
  document.getElementById('heroH1').textContent=t('heroH1');
  document.getElementById('heroP').innerHTML=t('heroP');
  document.getElementById('secActiveH').textContent=t('activeH');
  document.getElementById('secActiveSub').textContent=t('activeSub');
  document.getElementById('secDoneH').textContent=t('doneH');
  document.getElementById('secDoneSub').textContent=t('doneSub');
  document.getElementById('langToggle').textContent=t('toggle');
  document.getElementById('activeGrid').innerHTML = act.map(activeCard).join("") || '<div class="desc">—</div>';
  document.getElementById('doneList').innerHTML = done.map(doneRow).join("") || '<div class="desc">—</div>';
  document.getElementById('activeBadge').textContent = (lang==='ko'? act.length+t('running') : act.length+" "+t('running'));
  document.getElementById('doneBadge').textContent = (lang==='ko'? done.length+t('archived') : done.length+" "+t('archived'));
  document.getElementById('stats').innerHTML =
    '<div class="stat gn"><b>'+act.length+'</b><span>'+t('sActive')+'</span></div>'+
    '<div class="stat gd"><b>'+done.length+'</b><span>'+t('sCompleted')+'</span></div>'+
    '<div class="stat cb"><b>'+SURVEYS.length+'</b><span>'+t('sTotal')+'</span></div>';
  var d=new Date();
  document.getElementById('today').textContent = d.getFullYear()+'.'+('0'+(d.getMonth()+1)).slice(-2)+'.'+('0'+d.getDate()).slice(-2);
}

document.getElementById('langToggle').addEventListener('click', function(){
  lang = (lang==='en'?'ko':'en');
  try{ document.documentElement.lang = lang; }catch(e){}
  render();
});

var toastT;
function toast(msg){ if(!msg) return; var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(function(){ t.classList.remove('show'); },2800); }
document.addEventListener('click', function(e){ var d=e.target.closest('.disabled'); if(d && d.getAttribute('data-note')){ toast(d.getAttribute('data-note')); } });
document.addEventListener('keydown', function(e){ if((e.key==="Enter"||e.key===" ") && document.activeElement && document.activeElement.classList.contains('disabled')){ e.preventDefault(); toast(document.activeElement.getAttribute('data-note')); } });

render();

/* welcome intro → dissolve into the hub */
(function(){
  var intro=document.getElementById('intro');
  if(!intro) return;
  var done=false;
  function dismiss(){ if(done) return; done=true; intro.classList.add('out'); setTimeout(function(){ if(intro && intro.parentNode) intro.parentNode.removeChild(intro); }, 900); }
  var tm=setTimeout(dismiss, 2100);
  intro.addEventListener('click', function(){ clearTimeout(tm); dismiss(); });
})();
</script>
</body>
</html>
