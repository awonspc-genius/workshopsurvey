<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BRK Genius · 서베이 시스템</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root{
    --bg:#ECEEF3; --card:#FFFFFF;
    --ink:#14161D; --ink2:#3A3F4D; --muted:#5A5F6E;
    --line:#E1E3EA; --line2:#EAECF1;
    --blue:#2A36D8; --blue-deep:#1E27A8; --blue-soft:#E7E9FB;
    --coral:#FF4E33; --coral-deep:#DE3A1F; --coral-soft:#FFE6E0;
    --slate:#9AA0AE; --slate-soft:#E8EAEF;
    --shadow:rgba(20,22,29,.18);
    --font:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font); color:var(--ink); font-size:16px; line-height:1.55; letter-spacing:-.005em;
    background-color:var(--bg);
    background-image:linear-gradient(rgba(20,22,29,.032) 1px,transparent 1px),linear-gradient(90deg,rgba(20,22,29,.032) 1px,transparent 1px);
    background-size:58px 58px; background-position:-1px -1px;
    min-height:100vh; display:flex; flex-direction:column;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }

  .nav{display:flex; align-items:center; justify-content:space-between; padding:17px clamp(20px,5vw,56px);
    position:sticky; top:0; z-index:20; background:rgba(236,238,243,.8); backdrop-filter:saturate(1.4) blur(10px); border-bottom:1px solid var(--line);}
  .brand{display:flex; align-items:center; gap:12px;}
  .brand .wm{font-weight:800; font-size:17px; color:var(--ink); line-height:1; display:flex; flex-direction:column; letter-spacing:-.02em;}
  .brand .wm small{font-weight:600; font-size:10px; letter-spacing:.13em; text-transform:uppercase; color:var(--muted); margin-top:5px; letter-spacing:.04em;}
  .langtoggle{font-family:var(--font); font-weight:700; font-size:13px; letter-spacing:.01em; color:var(--blue); background:var(--card);
    border:1.5px solid var(--blue-soft); border-radius:10px; padding:9px 15px; cursor:pointer; transition:all .15s ease; display:inline-flex; align-items:center; gap:7px;}
  .langtoggle::before{content:"🌐"; font-size:12.5px;}
  .langtoggle:hover{border-color:var(--blue); background:var(--blue-soft);}

  main{flex:1; width:100%; max-width:1040px; margin:0 auto; padding:clamp(36px,6vw,66px) clamp(20px,4vw,40px);}

  .hero{max-width:780px;}
  .hero-eyebrow{font-weight:700; font-size:12px; letter-spacing:.15em; text-transform:uppercase; color:var(--blue);
    display:flex; align-items:center; gap:11px; margin:0 0 18px;}
  .hero-eyebrow::before{content:""; width:28px; height:2px; background:var(--coral); display:inline-block; border-radius:2px;}
  .hero h1{font-weight:800; font-size:clamp(38px,6.2vw,60px); letter-spacing:-.025em; line-height:1.05; margin:0; color:var(--ink);}
  .hero p{font-size:17px; line-height:1.55; color:var(--muted); margin:17px 0 0; max-width:50ch;}

  .idx{margin-top:32px; max-width:580px;}
  .idx-bar{height:10px; border-radius:6px; background:var(--slate-soft); overflow:hidden; display:flex; border:1px solid var(--line);}
  .idx-fill{height:100%; background:var(--coral); border-radius:6px 0 0 6px; transition:width .7s cubic-bezier(.2,.7,.3,1);}
  .idx-legend{display:flex; align-items:center; gap:22px; margin-top:13px; flex-wrap:wrap;}
  .idx-k{display:inline-flex; align-items:center; gap:8px; font-size:13.5px; color:var(--muted); font-weight:500;}
  .idx-k b{color:var(--ink); font-weight:700; font-size:15px; margin-left:1px;}
  .idx-k .dot{width:9px; height:9px; border-radius:50%; flex:none;}
  .idx-k .live-dot{background:var(--coral); box-shadow:0 0 0 3px var(--coral-soft);}
  .idx-k .done-dot{background:var(--slate);}
  .idx-tot{margin-left:auto; padding-left:18px; border-left:1px solid var(--line);}
  @media (max-width:520px){ .idx-tot{margin-left:0; padding-left:0; border-left:none;} }

  .sec{margin-top:52px;}
  .sec-head{display:flex; align-items:center; gap:13px; padding:0 2px 14px; border-bottom:2px solid var(--line); margin-bottom:22px;}
  .sec-head.active{border-bottom-color:var(--coral);}
  .sec-head.done{border-bottom-color:var(--slate-soft);}
  .sec-dot{width:10px; height:10px; border-radius:50%; flex:none;}
  .sec-head.active .sec-dot{background:var(--coral); box-shadow:0 0 0 4px var(--coral-soft); animation:pulse 2s infinite;}
  .sec-head.done .sec-dot{background:var(--slate);}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 4px var(--coral-soft);}50%{box-shadow:0 0 0 7px rgba(255,78,51,.05);}}
  .sec-head h2{font-weight:800; font-size:19px; letter-spacing:-.01em; margin:0; color:var(--ink);}
  .sec-head.done h2{color:var(--ink2);}
  .sec-head .sub{font-size:13.5px; color:var(--muted);}
  .sec-head .badge{margin-left:auto; font-weight:700; font-size:12px; letter-spacing:.01em; padding:5px 11px; border-radius:8px;}
  .sec-head.active .badge{background:var(--blue); color:#fff;}
  .sec-head.done .badge{background:var(--slate-soft); color:var(--muted);}
  .sec-body{padding:0;}

  .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:18px;}
  @media (max-width:720px){ .grid{grid-template-columns:1fr;} }
  .acard{display:flex; flex-direction:column; background:var(--card); border:1px solid var(--line); border-radius:16px;
    text-decoration:none; color:inherit; cursor:default; transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease; position:relative; overflow:hidden;}
  .acard::before{content:""; position:absolute; top:0; left:0; right:0; height:4px; background:var(--coral); z-index:4;}
  .acard.feature::before{background:linear-gradient(90deg,var(--blue),var(--coral));}
  .acard:hover{border-color:var(--blue); transform:translateY(-4px); box-shadow:0 30px 52px -30px var(--shadow);}
  .acard.disabled{cursor:default;}
  .acard.disabled::before{background:var(--slate);}
  .acard.disabled:hover{border-color:var(--line); transform:none; box-shadow:none;}
  .ac-body{display:flex; flex-direction:column; flex:1; padding:22px 22px 24px;}
  .ac-photo{position:relative; height:152px; overflow:hidden; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,var(--blue),var(--blue-deep));}
  .ac-photo img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; transition:transform .4s ease;}
  .ac-photo .ph-emoji{font-size:48px; line-height:1; z-index:1; filter:drop-shadow(0 6px 14px rgba(0,0,0,.26));}
  .ac-photo .ph-scrim{position:absolute; inset:0; z-index:2; background:linear-gradient(to top,rgba(11,13,20,.46),rgba(11,13,20,.05) 52%,transparent 70%);}
  .ac-photo .ph-pill{position:absolute; top:13px; right:13px; z-index:3;}
  .ac-photo .ph-pill .tag,.ac-photo .ph-pill .live{background:rgba(255,255,255,.95); box-shadow:0 4px 12px -4px rgba(0,0,0,.34);}
  .ac-photo .ph-pill .tag{color:var(--blue-deep);} .ac-photo .ph-pill .live{color:var(--coral-deep);}
  .acard.has-photo:hover .ac-photo img{transform:scale(1.05);}
  .ac-top{display:flex; align-items:center; justify-content:space-between; margin:2px 0 16px;}
  .emoji{font-size:30px; line-height:1;}
  .tag{font-family:var(--font); font-weight:700; font-size:10.5px; letter-spacing:.06em; padding:5px 10px; border-radius:7px; background:var(--blue-soft); color:var(--blue-deep);}
  .live{font-family:var(--font); font-weight:700; font-size:11px; letter-spacing:.03em; color:var(--coral-deep); display:inline-flex; align-items:center; gap:6px;}
  .live .d{width:7px; height:7px; border-radius:50%; background:var(--coral); animation:pulse 2s infinite;}
  .acard h3{font-weight:800; font-size:19px; line-height:1.32; letter-spacing:-.015em; margin:0 0 8px; color:var(--ink);}
  .desc{font-size:14.5px; color:var(--muted); line-height:1.55; margin:0;}
  .meta{font-size:12.5px; color:var(--muted); margin-top:16px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; font-weight:500;}
  .meta .sep{opacity:.4;}
  .cta-row{display:flex; gap:9px; margin-top:18px; flex-wrap:wrap; align-items:center;}
  .cta{font-family:var(--font); font-weight:700; font-size:13.5px; text-decoration:none;
    background:var(--blue); color:#fff; padding:11px 17px; border-radius:10px; display:inline-flex; align-items:center; gap:8px; transition:background .16s ease; cursor:pointer;}
  .cta-row .cta{margin-top:0;}
  .acard:hover .cta{background:var(--blue-deep);} .acard:hover .cta .arr{transform:translateX(3px);}
  .cta.muted{margin-top:18px; align-self:flex-start; background:var(--slate-soft); color:var(--muted);} .acard:hover .cta.muted{background:var(--slate-soft);}
  .cta2{font-family:var(--font); font-weight:700; font-size:13.5px; text-decoration:none; cursor:pointer;
    background:var(--blue-soft); color:var(--blue-deep); padding:11px 16px; border-radius:10px; display:inline-flex; align-items:center; gap:7px; border:1.5px solid transparent; transition:all .16s ease;}
  .cta2:hover{background:var(--card); border-color:var(--blue);}
  .arr{transition:transform .16s ease;}

  .donelist{display:flex; flex-direction:column; background:var(--card); border:1px solid var(--line); border-radius:16px; overflow:hidden;}
  .drow{display:flex; align-items:center; gap:16px; padding:17px 18px; text-decoration:none; color:inherit;
    cursor:pointer; transition:background .14s ease; border-bottom:1px solid var(--line2);}
  .drow:last-child{border-bottom:none;}
  .drow:hover{background:#F6F7FA;}
  .drow.disabled{cursor:default;}
  .d-emoji{font-size:21px; line-height:1; opacity:.65; flex:none;}
  .d-main{flex:1; min-width:0;}
  .d-title{font-weight:700; font-size:15.5px; color:var(--ink); margin:0; line-height:1.35;}
  .d-meta{font-size:12.5px; color:var(--muted); margin-top:3px;}
  .d-resp{font-weight:700; font-size:13.5px; color:var(--ink2); white-space:nowrap;}
  .d-go{font-family:var(--font); font-weight:600; font-size:12.5px; color:var(--muted); white-space:nowrap; display:inline-flex; align-items:center; gap:5px;}
  .drow:hover .d-go{color:var(--blue);}
  @media (max-width:560px){ .d-resp{display:none;} }

  footer{margin-top:62px; padding:28px clamp(20px,5vw,56px); border-top:1px solid var(--line); display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;}
  footer span{font-size:12.5px; color:var(--muted);}

  .toast{position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff;
    font-size:14px; padding:13px 20px; border-radius:12px; opacity:0; pointer-events:none; transition:all .25s ease; z-index:50; box-shadow:0 18px 40px -16px var(--shadow); max-width:90vw;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .fade{animation:rise .45s cubic-bezier(.2,.7,.3,1);}
  @keyframes rise{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important;}}
  a:focus-visible,.drow:focus-visible,.acard:focus-visible,.langtoggle:focus-visible{outline:2px solid var(--blue); outline-offset:3px;}

  .intro{position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center; text-align:center; cursor:pointer; color:#fff;
    background:
      radial-gradient(58% 48% at 50% 18%, rgba(255,78,51,.24), transparent 62%),
      radial-gradient(125% 120% at 50% 0%, #2A36D8 0%, #1B238F 48%, #11143A 100%);
    transition:opacity .85s ease, transform .85s ease, filter .85s ease;}
  .intro.out{opacity:0; transform:scale(1.04); filter:blur(7px); pointer-events:none;}
  .intro-inner{animation:introIn .9s cubic-bezier(.2,.8,.25,1) both; padding:0 24px;}
  .intro-mark{animation:introPop .75s cubic-bezier(.2,1.2,.3,1) both; filter:drop-shadow(0 12px 26px rgba(0,0,0,.3));}
  .intro-eyebrow{font-weight:700; font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#B9C2FF; margin-top:28px;}
  .intro-title{font-weight:800; font-size:clamp(40px,8.5vw,72px); letter-spacing:-.035em; margin:12px 0 0; line-height:1;}
  .intro-by{font-weight:700; font-size:clamp(15px,2.6vw,19px); color:#FF8A75; margin-top:16px; letter-spacing:.05em;}
  .intro-skip{position:absolute; bottom:30px; left:50%; transform:translateX(-50%); font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:rgba(255,255,255,.5); font-weight:600;}
  @keyframes introIn{from{opacity:0; transform:translateY(16px) scale(.97);} to{opacity:1; transform:none;}}
  @keyframes introPop{from{opacity:0; transform:scale(.55);} to{opacity:1; transform:scale(1);}}
</style>
</head>
<body>

<div class="intro" id="intro">
  <div class="intro-inner">
    <svg class="intro-mark" width="84" height="84" viewBox="0 0 72 72" aria-hidden="true">
      <circle cx="36" cy="36" r="34" fill="#fff" stroke="#14161D" stroke-width="2.5"/>
      <circle cx="36" cy="36" r="28" fill="none" stroke="#C8CEF6" stroke-width="1.5"/>
      <text x="36" y="37.5" text-anchor="middle" dominant-baseline="central" font-family="Pretendard Variable, sans-serif" font-weight="800" font-size="29" fill="#2A36D8" style="letter-spacing:-1px">31</text>
      <circle cx="16" cy="20" r="2.4" fill="#2A36D8"/><circle cx="57" cy="22" r="2.6" fill="#FF4E33"/><circle cx="52" cy="54" r="2.4" fill="#2A36D8"/>
    </svg>
    <div class="intro-eyebrow" id="introEyebrow">Welcome to</div>
    <h1 class="intro-title">BRK Genius</h1>
    <div class="intro-by">서베이 시스템</div>
  </div>
</div>

<header class="nav">
  <div class="brand">
    <svg width="30" height="30" viewBox="0 0 72 72" aria-hidden="true">
      <circle cx="36" cy="36" r="34" fill="#fff" stroke="#14161D" stroke-width="2.5"/>
      <circle cx="36" cy="36" r="28" fill="none" stroke="#C8CEF6" stroke-width="1.5"/>
      <text x="36" y="37.5" text-anchor="middle" dominant-baseline="central" font-family="Pretendard Variable, sans-serif" font-weight="800" font-size="29" fill="#2A36D8" style="letter-spacing:-1px">31</text>
      <circle cx="16" cy="20" r="2.4" fill="#2A36D8"/><circle cx="57" cy="22" r="2.6" fill="#FF4E33"/><circle cx="52" cy="54" r="2.4" fill="#2A36D8"/>
    </svg>
    <span class="wm">BRK Genius<small>서베이 시스템 · 마케팅전략실</small></span>
  </div>
  <button class="langtoggle" id="langToggle">EN</button>
</header>

<main class="fade">
  <section class="hero">
    <div class="hero-eyebrow">BRK Genius · 마케팅전략실 지니어스팀</div>
    <h1 id="heroH1">Surveys</h1>
    <p id="heroP"></p>
    <div class="stats" id="stats"></div>
  </section>

  <section class="sec">
    <div class="sec-head active">
      <span class="sec-dot"></span>
      <div><h2 id="secActiveH">Active surveys</h2><div class="sub" id="secActiveSub">Open to respondents right now</div></div>
      <span class="badge" id="activeBadge"></span>
    </div>
    <div class="sec-body active"><div class="grid" id="activeGrid"></div></div>
  </section>

  <section class="sec">
    <div class="sec-head done">
      <span class="sec-dot"></span>
      <div><h2 id="secDoneH">Completed surveys</h2><div class="sub" id="secDoneSub">Closed — archived results</div></div>
      <span class="badge" id="doneBadge"></span>
    </div>
    <div class="sec-body done"><div class="donelist" id="doneList"></div></div>
  </section>
</main>

<footer>
  <span>© Baskin-Robbins Korea · 마케팅전략실</span>
  <span id="today"></span>
</footer>

<div class="toast" id="toast"></div>

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* Per-store photo + placeholder tint.
   Drop a photo at  img/<slug>.jpg  (e.g. img/cheongdam.jpg) and it shows automatically.
   Until then, a branded gradient placeholder is used. */
var STORE_TINT = {
  workshop:['#2B4CC4','#1E3795'],
  cheongdam:['#3A5BD9','#1E2A6B'],
  parnas:['#2C7DA0','#184E6B'],
  gangnam:['#D94F9C','#7A2A66'],
  square:['#2B4CC4','#16307F'],
  'busan-seomyeon':['#1E9E9E','#125E66'],
  paradise:['#1E9E7E','#C2974A']
};
function storeSlug(s){
  if(!s.url) return null;
  var m = s.url.match(/[?&]store=([^&]+)/);
  if(m) return decodeURIComponent(m[1]);
  if(s.url.indexOf('br-survey-system.html')===0) return 'workshop';
  return null;
}
function photoBanner(s, pillHtml){
  var slug = storeSlug(s);
  if(!slug) return null;
  var tint = STORE_TINT[slug] || ['#2B4CC4','#1E3795'];
  return '<div class="ac-photo" style="background:linear-gradient(135deg,'+tint[0]+','+tint[1]+')">'+
    '<span class="ph-emoji">'+esc(s.emoji||'📋')+'</span>'+
    '<img src="img/'+esc(slug)+'.jpg" alt="" loading="lazy" onerror="this.style.display=\'none\'">'+
    '<span class="ph-scrim"></span>'+
    '<span class="ph-pill">'+pillHtml+'</span>'+
  '</div>';
}
function activeCard(s){
  var pill = s.feature
    ? '<span class="tag">'+t('flagship')+'</span>'
    : '<span class="live"><span class="d"></span>'+t('live')+'</span>';
  var banner = photoBanner(s, pill);
  var inner =
    (banner ? '' : '<div class="ac-top"><span class="emoji">'+esc(s.emoji||"📋")+'</span>'+pill+'</div>')+
    '<h3>'+esc(L(s.title))+'</h3>'+
    '<p class="desc">'+esc(L(s.desc))+'</p>'+
    '<div class="meta"><span>'+esc(L(s.period))+'</span><span class="sep">·</span><span>'+esc(L(s.meta))+'</span><span class="sep">·</span><span>'+esc(L(s.responses))+'</span></div>';
  if(s.url){
    var slug = storeSlug(s);
    var adminUrl = 'br-survey-admin.html'+(slug?('?store='+encodeURIComponent(slug)):'');
    var row =
      '<div class="cta-row">'+
        '<a class="cta" href="'+esc(s.url)+'">'+t('open')+' <span class="arr">→</span></a>'+
        '<a class="cta2" href="'+esc(adminUrl)+'">'+t('analyze')+'</a>'+
      '</div>';
    return '<div class="acard'+(s.feature?' feature':'')+(banner?' has-photo':'')+'">'+
      (banner||'')+'<div class="ac-body">'+inner+row+'</div></div>';
  }
  return '<div class="acard disabled'+(banner?' has-photo':'')+'" role="button" tabindex="0" data-note="'+esc(L(s.note)||"")+'">'+
    (banner||'')+'<div class="ac-body">'+inner+'<span class="cta muted">'+t('notLinked')+'</span></div></div>';
}
function doneRow(s){
  var inner =
    '<span class="d-emoji">'+esc(s.emoji||"📋")+'</span>'+
    '<span class="d-main"><span class="d-title">'+esc(L(s.title))+'</span><span class="d-meta">'+esc(L(s.period))+' · '+esc(L(s.meta))+'</span></span>'+
    '<span class="d-resp">'+esc(L(s.responses))+'</span>'+
    '<span class="d-go">'+t('results')+' <span class="arr">→</span></span>';
  if(s.resultsUrl){ return '<a class="drow" href="'+esc(s.resultsUrl)+'">'+inner+'</a>'; }
  return '<div class="drow disabled" role="button" tabindex="0" data-note="'+esc(L(s.note)||"")+'">'+inner+'</div>';
}

function render(){
  var act=SURVEYS.filter(function(s){return s.status==="active";});
  var done=SURVEYS.filter(function(s){return s.status==="completed";});
  document.getElementById('heroH1').textContent=t('heroH1');
  document.getElementById('heroP').innerHTML=t('heroP');
  document.getElementById('secActiveH').textContent=t('activeH');
  document.getElementById('secActiveSub').textContent=t('activeSub');
  document.getElementById('secDoneH').textContent=t('doneH');
  document.getElementById('secDoneSub').textContent=t('doneSub');
  document.getElementById('langToggle').textContent=t('toggle');
  document.getElementById('activeGrid').innerHTML = act.map(activeCard).join("") || '<div class="desc">—</div>';
  document.getElementById('doneList').innerHTML = done.map(doneRow).join("") || '<div class="desc">—</div>';
  document.getElementById('activeBadge').textContent = (lang==='ko'? act.length+t('running') : act.length+" "+t('running'));
  document.getElementById('doneBadge').textContent = (lang==='ko'? done.length+t('archived') : done.length+" "+t('archived'));
  var totN = SURVEYS.length || 1;
  var pct = Math.round(act.length / totN * 100);
  document.getElementById('stats').innerHTML =
    '<div class="idx">'+
      '<div class="idx-bar"><span class="idx-fill" style="width:'+pct+'%"></span></div>'+
      '<div class="idx-legend">'+
        '<span class="idx-k"><i class="dot live-dot"></i>'+t('sActive')+' <b>'+act.length+'</b></span>'+
        '<span class="idx-k"><i class="dot done-dot"></i>'+t('sCompleted')+' <b>'+done.length+'</b></span>'+
        '<span class="idx-k idx-tot">'+t('sTotal')+' <b>'+SURVEYS.length+'</b></span>'+
      '</div>'+
    '</div>';
  var d=new Date();
  document.getElementById('today').textContent = d.getFullYear()+'.'+('0'+(d.getMonth()+1)).slice(-2)+'.'+('0'+d.getDate()).slice(-2);
}

document.getElementById('langToggle').addEventListener('click', function(){
  lang = (lang==='en'?'ko':'en');
  try{ document.documentElement.lang = lang; }catch(e){}
  render();
});

var toastT;
function toast(msg){ if(!msg) return; var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(function(){ t.classList.remove('show'); },2800); }
document.addEventListener('click', function(e){ var d=e.target.closest('.disabled'); if(d && d.getAttribute('data-note')){ toast(d.getAttribute('data-note')); } });
document.addEventListener('keydown', function(e){ if((e.key==="Enter"||e.key===" ") && document.activeElement && document.activeElement.classList.contains('disabled')){ e.preventDefault(); toast(document.activeElement.getAttribute('data-note')); } });

render();

/* welcome intro → dissolve into the hub */
(function(){
  var intro=document.getElementById('intro');
  if(!intro) return;
  var done=false;
  function dismiss(){ if(done) return; done=true; intro.classList.add('out'); setTimeout(function(){ if(intro && intro.parentNode) intro.parentNode.removeChild(intro); }, 900); }
  var tm=setTimeout(dismiss, 2100);
  intro.addEventListener('click', function(){ clearTimeout(tm); dismiss(); });
})();
</script>
